<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Manage Verses</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Additional admin-specific styles */
    .admin-container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 1rem;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .back-link {
      color: #6f5b47;
      text-decoration: none;
      font-weight: 600;
      background: #f5ede1;
      padding: 0.6rem 1.4rem;
      border-radius: 2rem;
      transition: 0.2s;
    }

    .back-link:hover {
      background: #e7d7bd;
    }

    .verse-list {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .verse-item {
      background: #fffdf7;
      border-radius: 1.5rem;
      padding: 1.5rem;
      box-shadow: 0 6px 16px rgba(140, 110, 70, 0.12);
      border: 1px solid #e7d5b5;
      transition: 0.2s;
    }

    .verse-item:hover {
      box-shadow: 0 10px 22px rgba(120, 90, 50, 0.18);
    }

    .verse-item label {
      display: block;
      font-weight: 600;
      color: #4e3b2c;
      margin-bottom: 0.3rem;
      font-size: 0.9rem;
    }

    .verse-item input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid #d6b690;
      border-radius: 2rem;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      background: #fefaf5;
      margin-bottom: 0.7rem;
    }

    .verse-item input:focus {
      outline: none;
      border-color: #b38b5b;
      box-shadow: 0 0 0 3px rgba(179, 139, 91, 0.2);
    }

    .verse-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .btn-small {
      background: #f0e5d8;
      border: 1px solid #c8aa7a;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: 0.2s;
    }

    .btn-small.danger {
      background: #f8e8e8;
      border-color: #d4a0a0;
      color: #8b3a3a;
    }

    .btn-small:hover {
      background: #e5d5bc;
    }

    .add-section {
      background: #faf5eb;
      border-radius: 2rem;
      padding: 1.8rem;
      margin-top: 2rem;
      border: 2px dashed #d6b690;
    }

    .save-all-btn {
      background: #cfae7a;
      border: none;
      color: #2d2418;
      font-weight: 700;
      padding: 1rem 2.5rem;
      border-radius: 3rem;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 1rem;
    }

    .save-all-btn:hover {
      background: #dbb27a;
      transform: scale(1.02);
    }

    .message {
      padding: 0.8rem 1.5rem;
      border-radius: 2rem;
      margin: 1rem 0;
      text-align: center;
      font-weight: 500;
    }

    .message.success {
      background: #e6f3e6;
      color: #2d5a2d;
    }

    .message.error {
      background: #fae6e6;
      color: #8b3a3a;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <h1 style="color: #4b3a2b;">🕊️ Manage Peace Verses</h1>
      <a href="index.html" class="back-link">← Back to User View</a>
    </div>

    <div id="messageArea"></div>

    <div id="verseListContainer" class="verse-list">
      <!-- Verses dynamically generated here -->
    </div>

    <div class="add-section">
      <h3 style="color: #4b3a2b; margin-bottom: 1rem;">➕ Add New Verse</h3>
      <input type="text" id="newEnglish" placeholder="English verse..." style="width:100%; margin-bottom:0.8rem; padding:0.7rem; border-radius:2rem; border:1px solid #d6b690;">
      <input type="text" id="newSwahili" placeholder="Swahili translation..." style="width:100%; margin-bottom:1rem; padding:0.7rem; border-radius:2rem; border:1px solid #d6b690;">
      <button onclick="addNewVerse()" class="btn-small" style="background:#cfae7a; color:#2d2418;">Add Verse</button>
    </div>

    <div style="display:flex; justify-content:center; margin-top:1.5rem;">
      <button onclick="saveAllVerses()" class="save-all-btn">💾 Save All Changes</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Admin-specific logic
    document.addEventListener('DOMContentLoaded', function() {
      renderAdminVerseList();
    });

    function renderAdminVerseList() {
      const container = document.getElementById('verseListContainer');
      const verses = getVerses();
      
      container.innerHTML = verses.map((verse, index) => `
        <div class="verse-item" data-index="${index}">
          <label>📝 English (Verse ${index + 1})</label>
          <input type="text" class="en-input" value="${escapeHtml(verse.en)}" data-index="${index}">
          <label>🌍 Swahili</label>
          <input type="text" class="sw-input" value="${escapeHtml(verse.sw)}" data-index="${index}">
          <div class="verse-actions">
            <button onclick="moveVerseUp(${index})" class="btn-small" ${index === 0 ? 'disabled' : ''}>↑ Up</button>
            <button onclick="moveVerseDown(${index})" class="btn-small" ${index === verses.length - 1 ? 'disabled' : ''}>↓ Down</button>
            <button onclick="deleteVerse(${index})" class="btn-small danger">🗑 Delete</button>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function collectAdminEdits() {
      const enInputs = document.querySelectorAll('.en-input');
      const swInputs = document.querySelectorAll('.sw-input');
      const verses = [];
      
      enInputs.forEach((input, i) => {
        verses.push({
          en: input.value.trim(),
          sw: swInputs[i].value.trim()
        });
      });
      
      return verses;
    }

    function saveAllVerses() {
      const updatedVerses = collectAdminEdits();
      
      // Validation
      for (let i = 0; i < updatedVerses.length; i++) {
        if (!updatedVerses[i].en || !updatedVerses[i].sw) {
          showMessage('Please fill in both English and Swahili for all verses.', 'error');
          return;
        }
      }
      
      if (updatedVerses.length === 0) {
        showMessage('Cannot save empty verse list.', 'error');
        return;
      }
      
      saveVerses(updatedVerses);
      showMessage('✅ All verses saved successfully! Changes will appear on the user page.', 'success');
      renderAdminVerseList();
    }

    function deleteVerse(index) {
      if (!confirm('Delete this verse?')) return;
      const verses = collectAdminEdits();
      verses.splice(index, 1);
      saveVerses(verses);
      renderAdminVerseList();
      showMessage('Verse deleted.', 'success');
    }

    function addNewVerse() {
      const en = document.getElementById('newEnglish').value.trim();
      const sw = document.getElementById('newSwahili').value.trim();
      
      if (!en || !sw) {
        showMessage('Both English and Swahili fields are required.', 'error');
        return;
      }
      
      const verses = collectAdminEdits();
      verses.push({ en, sw });
      saveVerses(verses);
      document.getElementById('newEnglish').value = '';
      document.getElementById('newSwahili').value = '';
      renderAdminVerseList();
      showMessage('New verse added!', 'success');
    }

    function moveVerseUp(index) {
      if (index === 0) return;
      const verses = collectAdminEdits();
      [verses[index - 1], verses[index]] = [verses[index], verses[index - 1]];
      saveVerses(verses);
      renderAdminVerseList();
    }

    function moveVerseDown(index) {
      const verses = collectAdminEdits();
      if (index >= verses.length - 1) return;
      [verses[index], verses[index + 1]] = [verses[index + 1], verses[index]];
      saveVerses(verses);
      renderAdminVerseList();
    }

    function showMessage(text, type) {
      const area = document.getElementById('messageArea');
      area.innerHTML = `<div class="message ${type}">${text}</div>`;
      setTimeout(() => { area.innerHTML = ''; }, 3000);
    }
  </script>
</body>
</html>
