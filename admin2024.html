<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel · Peace Verses</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #2d2418 0%, #4b3a2b 100%);
      min-height: 100vh;
      font-family: 'Quicksand', 'Segoe UI', sans-serif;
      padding: 1.5rem;
      color: #f5ede1;
    }

    .admin-container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 1rem;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
      background: rgba(255, 253, 247, 0.1);
      padding: 1.5rem;
      border-radius: 2rem;
      backdrop-filter: blur(10px);
    }

    .admin-header h1 {
      color: #e7cfaa;
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .back-link, .user-link {
      color: #e7cfaa;
      text-decoration: none;
      font-weight: 600;
      background: rgba(207, 174, 122, 0.2);
      padding: 0.6rem 1.4rem;
      border-radius: 2rem;
      transition: 0.3s;
      border: 1px solid rgba(207, 174, 122, 0.3);
    }

    .back-link:hover, .user-link:hover {
      background: rgba(207, 174, 122, 0.4);
      transform: translateY(-2px);
    }

    .verse-list {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .verse-item {
      background: rgba(255, 253, 247, 0.08);
      border-radius: 1.5rem;
      padding: 1.5rem;
      border: 1px solid rgba(207, 174, 122, 0.3);
      backdrop-filter: blur(5px);
      transition: 0.3s;
    }

    .verse-item:hover {
      background: rgba(255, 253, 247, 0.12);
      border-color: rgba(207, 174, 122, 0.5);
    }

    .verse-item label {
      display: block;
      font-weight: 600;
      color: #e7cfaa;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .verse-item input, .verse-item textarea {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1px solid rgba(207, 174, 122, 0.3);
      border-radius: 1rem;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      background: rgba(0, 0, 0, 0.3);
      color: #f5ede1;
      margin-bottom: 0.7rem;
      transition: 0.3s;
    }

    .verse-item input:focus, .verse-item textarea:focus {
      outline: none;
      border-color: #cfae7a;
      background: rgba(0, 0, 0, 0.5);
      box-shadow: 0 0 15px rgba(207, 174, 122, 0.3);
    }

    .verse-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn-small {
      background: rgba(207, 174, 122, 0.2);
      border: 1px solid rgba(207, 174, 122, 0.4);
      color: #e7cfaa;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: 0.3s;
    }

    .btn-small:hover {
      background: rgba(207, 174, 122, 0.4);
      transform: translateY(-2px);
    }

    .btn-small.danger {
      background: rgba(220, 100, 100, 0.2);
      border-color: rgba(220, 100, 100, 0.4);
      color: #ffaaaa;
    }

    .btn-small.danger:hover {
      background: rgba(220, 100, 100, 0.4);
    }

    .add-section {
      background: rgba(255, 253, 247, 0.08);
      border-radius: 2rem;
      padding: 2rem;
      margin-top: 2rem;
      border: 2px dashed rgba(207, 174, 122, 0.3);
    }

    .add-section h3 {
      color: #e7cfaa;
      margin-bottom: 1rem;
    }

    .save-all-btn {
      background: linear-gradient(135deg, #cfae7a, #b38b5b);
      border: none;
      color: #2d2418;
      font-weight: 700;
      padding: 1rem 2.5rem;
      border-radius: 3rem;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .save-all-btn:hover {
      background: linear-gradient(135deg, #dbb27a, #c49a6c);
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(207, 174, 122, 0.4);
    }

    .message {
      padding: 0.8rem 1.5rem;
      border-radius: 2rem;
      margin: 1rem 0;
      text-align: center;
      font-weight: 500;
      backdrop-filter: blur(5px);
    }

    .message.success {
      background: rgba(46, 125, 50, 0.3);
      color: #a5d6a7;
      border: 1px solid rgba(46, 125, 50, 0.5);
    }

    .message.error {
      background: rgba(198, 40, 40, 0.3);
      color: #ffaaaa;
      border: 1px solid rgba(198, 40, 40, 0.5);
    }

    .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .stat-card {
      background: rgba(207, 174, 122, 0.1);
      padding: 1rem 1.5rem;
      border-radius: 1rem;
      border: 1px solid rgba(207, 174, 122, 0.3);
      flex: 1;
      min-width: 150px;
      text-align: center;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: #e7cfaa;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #ab8b6e;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @media (max-width: 500px) {
      .admin-header {
        flex-direction: column;
        text-align: center;
      }
      .verse-actions {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <h1>🕊️ Admin Panel</h1>
      <div class="nav-links">
        <a href="index.html" class="user-link" target="_blank">👁️ View User Page</a>
        <a href="index.html" class="back-link">← Back to Site</a>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="verseCount">12</div>
        <div class="stat-label">Total Verses</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">🌍</div>
        <div class="stat-label">Bilingual</div>
      </div>
    </div>

    <div id="messageArea"></div>

    <div id="verseListContainer" class="verse-list">
      <!-- Verses will be generated here -->
    </div>

    <div class="add-section">
      <h3>➕ Add New Verse</h3>
      <input type="text" id="newEnglish" placeholder="English verse..." style="width:100%; margin-bottom:0.8rem;">
      <input type="text" id="newSwahili" placeholder="Swahili translation..." style="width:100%; margin-bottom:1rem;">
      <button onclick="addNewVerse()" class="btn-small" style="background:#cfae7a; color:#2d2418;">✨ Add Verse</button>
    </div>

    <div style="display:flex; justify-content:center; margin-top:2rem;">
      <button onclick="saveAllVerses()" class="save-all-btn">💾 Save All Changes</button>
    </div>
  </div>

  <script>
    // Default verses
    const DEFAULT_VERSES = [
      { en: "“There is only one you in this world.”", sw: "Kuna wewe mmoja tu duniani kote." },
      { en: "“Your uniqueness is your superpower.”", sw: "Upekee wako ndio nguvu yako kuu." },
      { en: "“Don't compare yourself to others; you are a masterpiece.”", sw: "Usijilinganishe na wengine; wewe ni kazi bora ya sanaa." },
      { en: "“Be yourself; everyone else is already taken.”", sw: "Kuwa wewe mwenyewe; kila mtu mwingine tayari amechukuliwa." },
      { en: "“Your difference is your beauty.”", sw: "Tofauti yako ndio urembo wako." },
      { en: "“You were born to stand out, not to fit in.”", sw: "Umezaliwa kuangaza, siyo kufanana na wote." },
      { en: "“No one can play your role better than you.”", sw: "Hakuna anayeweza kucheza nafasi yako vizuri kuliko wewe." },
      { en: "“Your voice matters because no one speaks like you.”", sw: "Sauti yako ni muhimu kwa sababu hakuna anayesema kama wewe." },
      { en: "“The world needs the original you, not a copy.”", sw: "Ulimwengu unahitaji wewe halisi, siyo nakala." },
      { en: "“Celebrate who you are — flaws and all.”", sw: "Sherehekea ulivyo — na makosa yako pamoja na yote." },
      { en: "“You are not a drop in the ocean; you are the entire ocean in a drop.”", sw: "Wewe si tone baharini; wewe ni bahari nzima ndani ya tone." },
      { en: "“Your story is written by no one else but you.”", sw: "Hadithi yako imeandikwa na mtu mwingine yeyote isipokuwa wewe." }
    ];

    function getVerses() {
      const stored = localStorage.getItem('adminPeaceVerses');
      if (stored) {
        try {
          return JSON.parse(stored);
        } catch (e) {
          return [...DEFAULT_VERSES];
        }
      }
      return [...DEFAULT_VERSES];
    }

    function saveVerses(verses) {
      localStorage.setItem('adminPeaceVerses', JSON.stringify(verses));
    }

    function renderAdminVerseList() {
      const container = document.getElementById('verseListContainer');
      const verses = getVerses();
      
      document.getElementById('verseCount').textContent = verses.length;
      
      container.innerHTML = verses.map((verse, index) => `
        <div class="verse-item" data-index="${index}">
          <label>📝 English (Verse ${index + 1})</label>
          <input type="text" class="en-input" value="${escapeHtml(verse.en)}" data-index="${index}">
          <label>🌍 Swahili</label>
          <input type="text" class="sw-input" value="${escapeHtml(verse.sw)}" data-index="${index}">
          <div class="verse-actions">
            <button onclick="moveVerseUp(${index})" class="btn-small" ${index === 0 ? 'disabled' : ''}>↑ Up</button>
            <button onclick="moveVerseDown(${index})" class="btn-small" ${index === verses.length - 1 ? 'disabled' : ''}>↓ Down</button>
            <button onclick="deleteVerse(${index})" class="btn-small danger">🗑 Delete</button>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function collectAdminEdits() {
      const enInputs = document.querySelectorAll('.en-input');
      const swInputs = document.querySelectorAll('.sw-input');
      const verses = [];
      enInputs.forEach((input, i) => {
        verses.push({ 
          en: input.value.trim(), 
          sw: swInputs[i] ? swInputs[i].value.trim() : '' 
        });
      });
      return verses;
    }

    function saveAllVerses() {
      const updatedVerses = collectAdminEdits();
      
      for (let i = 0; i < updatedVerses.length; i++) {
        if (!updatedVerses[i].en || !updatedVerses[i].sw) {
          showMessage('⚠️ Please fill in both English and Swahili for all verses.', 'error');
          return;
        }
      }
      
      if (updatedVerses.length === 0) {
        showMessage('⚠️ Cannot save empty verse list.', 'error');
        return;
      }
      
      saveVerses(updatedVerses);
      showMessage('✅ All verses saved successfully! Refresh user page to see changes.', 'success');
      renderAdminVerseList();
    }

    function deleteVerse(index) {
      if (!confirm('Are you sure you want to delete this verse?')) return;
      const verses = collectAdminEdits();
      verses.splice(index, 1);
      saveVerses(verses);
      renderAdminVerseList();
      showMessage('🗑️ Verse deleted successfully.', 'success');
    }

    function addNewVerse() {
      const en = document.getElementById('newEnglish').value.trim();
      const sw = document.getElementById('newSwahili').value.trim();
      
      if (!en || !sw) {
        showMessage('⚠️ Both English and Swahili fields are required.', 'error');
        return;
      }
      
      const verses = collectAdminEdits();
      verses.push({ en, sw });
      saveVerses(verses);
      
      document.getElementById('newEnglish').value = '';
      document.getElementById('newSwahili').value = '';
      
      renderAdminVerseList();
      showMessage('✨ New verse added successfully!', 'success');
    }

    function moveVerseUp(index) {
      if (index === 0) return;
      const verses = collectAdminEdits();
      [verses[index - 1], verses[index]] = [verses[index], verses[index - 1]];
      saveVerses(verses);
      renderAdminVerseList();
    }

    function moveVerseDown(index) {
      const verses = collectAdminEdits();
      if (index >= verses.length - 1) return;
      [verses[index], verses[index + 1]] = [verses[index + 1], verses[index]];
      saveVerses(verses);
      renderAdminVerseList();
    }

    function showMessage(text, type) {
      const area = document.getElementById('messageArea');
      area.innerHTML = `<div class="message ${type}">${text}</div>`;
      setTimeout(() => { area.innerHTML = ''; }, 4000);
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      renderAdminVerseList();
    });
  </script>
</body>
</html>
