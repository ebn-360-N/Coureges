<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Unique You · Peace Verses</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f9efe2 0%, #f5e7d3 100%);
      min-height: 100vh;
      font-family: 'Quicksand', 'Segoe UI', 'Georgia', serif;
      padding: 1.5rem;
      margin: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(210, 180, 140, 0.25) 0%, transparent 45%),
                  radial-gradient(circle at 80% 70%, rgba(188, 143, 143, 0.2) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 750px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .card {
      background: #fffdf7;
      border-radius: 3.5rem 3.5rem 3rem 3rem;
      box-shadow: 0 30px 50px rgba(140, 110, 70, 0.18),
                  0 10px 20px rgba(90, 60, 40, 0.1),
                  inset 0 1px 0 #ffffffdd;
      border: 1px solid rgba(230, 200, 160, 0.5);
      padding: 3rem 2.5rem;
      width: 100%;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      top: 0;
      left: 20%;
      width: 60%;
      height: 4px;
      background: linear-gradient(90deg, #d9b382, #c49a6c, #b3804d);
      border-radius: 20px;
      filter: blur(1px);
      opacity: 0.7;
    }

    .verse-icon {
      font-size: 2.4rem;
      margin-bottom: 0.5rem;
      opacity: 0.7;
      letter-spacing: 2px;
    }

    .english-verse {
      font-size: 2.1rem;
      font-weight: 500;
      font-family: 'Quicksand', 'Segoe UI', sans-serif;
      color: #4b3a2b;
      line-height: 1.4;
      margin-bottom: 1.2rem;
      word-break: break-word;
      transition: opacity 0.3s ease;
      letter-spacing: 0.3px;
    }

    .swahili-verse {
      font-size: 1.7rem;
      font-weight: 400;
      font-family: 'Quicksand', 'Georgia', serif;
      color: #6f5b47;
      line-height: 1.5;
      margin-bottom: 1rem;
      font-style: italic;
      word-break: break-word;
      border-top: 1px dashed #d9b382;
      padding-top: 1.3rem;
    }

    .counter {
      margin-top: 1.8rem;
      font-size: 0.9rem;
      letter-spacing: 2px;
      color: #ab8b6e;
      font-weight: 500;
      background: rgba(245, 235, 220, 0.7);
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      display: inline-block;
    }

    .nav-buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      margin-top: 0.8rem;
      flex-wrap: wrap;
    }

    .btn {
      background: #f5ede1;
      border: 1px solid #d6b690;
      color: #4e3b2c;
      font-weight: 600;
      font-size: 1.1rem;
      padding: 0.9rem 2.1rem;
      border-radius: 3rem;
      cursor: pointer;
      backdrop-filter: blur(12px);
      background: rgba(250, 242, 232, 0.8);
      box-shadow: 0 6px 14px rgba(150, 110, 70, 0.15);
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      letter-spacing: 0.6px;
      font-family: 'Quicksand', sans-serif;
      border: 1px solid rgba(200, 160, 110, 0.6);
    }

    .btn:hover {
      background: #f7efe2;
      box-shadow: 0 12px 22px rgba(150, 110, 60, 0.25);
      border-color: #b28b5b;
      color: #2f2419;
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 4px 10px rgba(120, 80, 40, 0.2);
    }

    .btn:disabled {
      opacity: 0.45;
      pointer-events: none;
      filter: grayscale(0.2);
      box-shadow: none;
      transform: none;
      border-color: #dac5a8;
      background: rgba(235, 220, 200, 0.7);
    }

    .reveal-btn {
      background: #d9b382;
      border: none;
      color: #2d2418;
      font-weight: 700;
      font-size: 1.3rem;
      padding: 1rem 2.8rem;
      border-radius: 4rem;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #e7cfaa, #cfae7a);
      box-shadow: 0 15px 25px rgba(160, 120, 60, 0.35);
      border: 1px solid #b38b5b;
      transition: 0.3s;
      text-transform: uppercase;
      font-family: 'Quicksand', sans-serif;
      cursor: pointer;
    }

    .reveal-btn:hover {
      background: linear-gradient(135deg, #eddaba, #dbb27a);
      box-shadow: 0 20px 30px rgba(140, 100, 40, 0.4);
      transform: scale(1.02);
    }

    .hidden {
      display: none;
    }

    .fade-in {
      animation: gentleFade 0.45s ease-in-out;
    }

    @keyframes gentleFade {
      0% { opacity: 0.4; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .peace-symbols {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 0.5rem;
      font-size: 1.2rem;
      opacity: 0.4;
    }

    @media (max-width: 500px) {
      .card {
        padding: 2.2rem 1.5rem;
      }
      .english-verse {
        font-size: 1.7rem;
      }
      .swahili-verse {
        font-size: 1.4rem;
      }
      .btn {
        padding: 0.7rem 1.5rem;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="startSection">
      <button id="revealCardBtn" class="reveal-btn">✨ Open the verse ✨</button>
    </div>

    <div id="verseCardContainer" class="hidden">
      <div class="card" id="verseCard">
        <div class="verse-icon">🌿✨🌼</div>
        <div id="englishDisplay" class="english-verse fade-in"></div>
        <div id="swahiliDisplay" class="swahili-verse fade-in"></div>
        <div class="counter" id="verseCounter">1 / 12</div>
      </div>

      <div class="nav-buttons">
        <button id="prevBtn" class="btn" title="Previous verse">← <span>Previous</span></button>
        <button id="nextBtn" class="btn" title="Next verse"><span>Next</span> →</button>
      </div>

      <div class="peace-symbols">☮️ ✨ 🕊️ ✨ ☮️</div>
    </div>
  </div>

  <script>
    (function() {
      const verses = [
        {
          en: "“There is only one you in this world.”",
          sw: "Kuna wewe mmoja tu duniani kote."
        },
        {
          en: "“Your uniqueness is your superpower.”",
          sw: "Upekee wako ndio nguvu yako kuu."
        },
        {
          en: "“Don't compare yourself to others; you are a masterpiece.”",
          sw: "Usijilinganishe na wengine; wewe ni kazi bora ya sanaa."
        },
        {
          en: "“Be yourself; everyone else is already taken.”",
          sw: "Kuwa wewe mwenyewe; kila mtu mwingine tayari amechukuliwa."
        },
        {
          en: "“Your difference is your beauty.”",
          sw: "Tofauti yako ndio urembo wako."
        },
        {
          en: "“You were born to stand out, not to fit in.”",
          sw: "Umezaliwa kuangaza, siyo kufanana na wote."
        },
        {
          en: "“No one can play your role better than you.”",
          sw: "Hakuna anayeweza kucheza nafasi yako vizuri kuliko wewe."
        },
        {
          en: "“Your voice matters because no one speaks like you.”",
          sw: "Sauti yako ni muhimu kwa sababu hakuna anayesema kama wewe."
        },
        {
          en: "“The world needs the original you, not a copy.”",
          sw: "Ulimwengu unahitaji wewe halisi, siyo nakala."
        },
        {
          en: "“Celebrate who you are — flaws and all.”",
          sw: "Sherehekea ulivyo — na makosa yako pamoja na yote."
        },
        {
          en: "“You are not a drop in the ocean; you are the entire ocean in a drop.”",
          sw: "Wewe si tone baharini; wewe ni bahari nzima ndani ya tone."
        },
        {
          en: "“Your story is written by no one else but you.”",
          sw: "Hadithi yako imeandikwa na mtu mwingine yeyote isipokuwa wewe."
        }
      ];

      let currentIndex = 0;
      const totalVerses = verses.length;

      const startSection = document.getElementById('startSection');
      const revealBtn = document.getElementById('revealCardBtn');
      const verseCardContainer = document.getElementById('verseCardContainer');
      const englishDisplay = document.getElementById('englishDisplay');
      const swahiliDisplay = document.getElementById('swahiliDisplay');
      const verseCounter = document.getElementById('verseCounter');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');

      function updateVerseDisplay() {
        const verse = verses[currentIndex];
        
        englishDisplay.textContent = verse.en;
        swahiliDisplay.textContent = verse.sw;
        verseCounter.textContent = `${currentIndex + 1} / ${totalVerses}`;

        englishDisplay.classList.remove('fade-in');
        swahiliDisplay.classList.remove('fade-in');
        void englishDisplay.offsetWidth;
        void swahiliDisplay.offsetWidth;
        englishDisplay.classList.add('fade-in');
        swahiliDisplay.classList.add('fade-in');

        prevBtn.disabled = (currentIndex === 0);
        nextBtn.disabled = (currentIndex === totalVerses - 1);
      }

      function revealCard() {
        startSection.classList.add('hidden');
        verseCardContainer.classList.remove('hidden');
        currentIndex = 0;
        updateVerseDisplay();
      }

      function nextVerse() {
        if (currentIndex < totalVerses - 1) {
          currentIndex++;
          updateVerseDisplay();
        }
      }

      function prevVerse() {
        if (currentIndex > 0) {
          currentIndex--;
          updateVerseDisplay();
        }
      }

      revealBtn.addEventListener('click', revealCard);
      prevBtn.addEventListener('click', prevVerse);
      nextBtn.addEventListener('click', nextVerse);

      window.addEventListener('keydown', function(e) {
        if (!startSection.classList.contains('hidden')) return;
        
        if (e.key === 'ArrowLeft') {
          e.preventDefault();
          if (!prevBtn.disabled) prevVerse();
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          if (!nextBtn.disabled) nextVerse();
        }
      });

      englishDisplay.textContent = verses[0].en;
      swahiliDisplay.textContent = verses[0].sw;
      verseCounter.textContent = `1 / ${totalVerses}`;
      prevBtn.disabled = true;
      nextBtn.disabled = (totalVerses === 1);
    })();
  </script>
</body>
</html>
